<div class="d-flex overflow-hidden">

  <!-- SIDEBAR -->
  <div
    class="bg-dark text-white p-3 vh-100"
    style="width: 250px;"
  >

    <h3 class="mb-4">
      Travel Planner
    </h3>

    <ul class="nav flex-column">

      <li class="nav-item mb-2">

        <a
          class="nav-link text-white"
          routerLink="/"
        >

          <i class="bi bi-calendar3 me-2"></i>

          Calendar

        </a>

      </li>

      <li class="nav-item mb-2">

        <a
          class="nav-link text-white"
          routerLink="/trips"
        >

          <i class="bi bi-airplane me-2"></i>

          Trips

        </a>

      </li>

    </ul>

  </div>

  <!-- MAIN -->
  <div class="flex-grow-1 p-4 overflow-auto">

    

    @if(!isTripsPage()) {
      <h2 class="mb-4">
      Calendar
      </h2>
      <app-calendar

      [events]="events"

      (dateSelected)="handleDateSelected($event)"

      (eventDeleted)="handleEventDeleted($event)"

      >
      </app-calendar>
    }
    @if (showModal) {

      <div
        class="modal d-block"
        tabindex="-1"
      >

        <div class="modal-dialog">

          <div class="modal-content">

            <div class="modal-header">

              <h5 class="modal-title">

                @if (editingEvent) {

                  Edit Trip

                } @else {

                  Add Trip

                }

              </h5>

              <button
                type="button"
                class="btn-close"
                (click)="handleDialogClosed()"
              ></button>

            </div>

            <div class="modal-body">

              <app-travel-dialog

                [selectedDate]="selectedDate"

                [editingEvent]="editingEvent"

                (tripAdded)="handleTripAdded($event)"

                (tripDeleted)="handleTripDeleted()"

                (dialogClosed)="handleDialogClosed()"

              >
              </app-travel-dialog>

            </div>

          </div>

        </div>

      </div>

      <div class="modal-backdrop fade show"></div>

    }

    <router-outlet></router-outlet>

  </div>

</div>
